<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>觀察清單 · 趨勢線 × 四象限</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  try{
    const t=localStorage.getItem("sv_theme");
    if(t==="dark") document.documentElement.setAttribute("data-theme","dark");
  }catch(e){}
</script>
<style>
  :root{
    --ground:#F4F6F9;       /* 頁面背景:極淺灰白 */
    --panel:#FFFFFF;        /* 卡片主面 */
    --panel-2:#F9FAFB;      /* 卡片漸層尾 */
    --line:#E2E6ED;         /* 邊框/分隔線 */
    --paper:#1A2332;        /* 主要文字(深藍灰) */
    --mist:#5A6A7E;         /* 次要文字 */
    --faint:#9BA8B8;        /* 說明/placeholder */
    --accent:#2563EB;       /* 品牌色:藍 */
    --accent-s:#EFF4FF;     /* 品牌淺底 */
    --up:#16A34A;           /* 上漲(綠) */
    --up-s:#F0FDF4;         /* 上漲淺底 */
    --down:#DC2626;         /* 下跌(紅) */
    --down-s:#FEF2F2;       /* 下跌淺底 */
    --z-acc:#15803D;        /* 累積 */
    --z-hold:#D97706;       /* 持有 */
    --z-wait:#2563EB;       /* 觀望 */
    --z-trim:#DC2626;       /* 減碼 */
    --price-line:#1A2332;   /* 價格線 */
    --point-border:#FFFFFF; /* 目前點外框 */
    --legend-bg:rgba(255,255,255,.72);
    --trend-band:rgba(37,99,235,.20);
    --trend-edge:rgba(37,99,235,.62);
    --shadow-sm:rgba(0,0,0,.06);
    --shadow-md:rgba(0,0,0,.12);
    --radius:14px;
    color-scheme:light;
  }
  html[data-theme="dark"]{
    --ground:#0B1120;       /* 深色頁面背景 */
    --panel:#111827;        /* 深色卡片 */
    --panel-2:#0F172A;      /* 深色卡片漸層 */
    --line:#263244;
    --paper:#E5EDF7;
    --mist:#A7B3C7;
    --faint:#71809A;
    --accent:#60A5FA;
    --accent-s:#172554;
    --up:#22C55E;
    --up-s:#052E1B;
    --down:#F87171;
    --down-s:#3B0A0A;
    --z-acc:#4ADE80;
    --z-hold:#F59E0B;
    --z-wait:#60A5FA;
    --z-trim:#F87171;
    --price-line:#EAF2FF;
    --point-border:#0F172A;
    --legend-bg:rgba(15,23,42,.72);
    --trend-band:rgba(96,165,250,.28);
    --trend-edge:rgba(96,165,250,.72);
    --shadow-sm:rgba(0,0,0,.28);
    --shadow-md:rgba(0,0,0,.42);
    color-scheme:dark;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ground);color:var(--paper);font-family:"Inter",system-ui,"PingFang TC","Microsoft JhengHei",sans-serif;-webkit-font-smoothing:antialiased;line-height:1.55;padding:0 0 50px;transition:background .18s ease,color .18s ease}
  .wrap{max-width:980px;margin:0 auto;padding:18px 18px 0;zoom:var(--zoom,1);--inv-zoom:1}.mono{font-family:"IBM Plex Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
  /* 工具列:左側垂直浮動控制面板,不放在 .wrap 內,避免介面 zoom 影響點擊區域 */
  .toolbar{position:fixed;left:10px;top:50%;transform:translateY(-50%);width:auto;height:auto;
    display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    box-shadow:0 3px 12px var(--shadow-md);padding:6px;z-index:20;align-items:center;gap:6px}
  .tb-actions{display:flex;flex-direction:column;align-items:center;gap:6px}
  .fontctl{display:flex;flex-direction:column;align-items:center;gap:4px}
  .fontctl button,.theme-toggle{background:transparent;border:none;color:var(--mist);cursor:pointer;font-size:12px;font-weight:700;padding:0;border-radius:8px;font-family:inherit;line-height:1;width:38px;height:34px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
  .fontctl button:hover,.theme-toggle:hover{background:var(--accent-s);color:var(--accent)}
  .fontctl #font-val{font-family:"IBM Plex Mono",monospace;font-size:10.5px;color:var(--paper);text-align:center;cursor:pointer;padding:0 4px;border-radius:8px;line-height:34px;user-select:none;width:42px;height:34px;writing-mode:horizontal-tb}
  .fontctl #font-val:hover{background:var(--accent-s);color:var(--accent)}
  .theme-toggle{font-size:16px;border-top:1px solid var(--line);padding-top:4px;margin-top:2px;border-radius:8px;width:38px;height:38px}
  html[data-theme="dark"] .theme-toggle{color:#FBBF24}

  .layout{display:grid;grid-template-columns:240px 1fr;gap:16px;align-items:start}
  @media(max-width:680px){.layout{grid-template-columns:1fr}}

  /* 側邊欄:黏住視窗,右側內容往下捲時仍可切換個股；高度不足時清單本身獨立捲動 */
  .side{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:0 0 10px;height:max-content;overflow:hidden;box-shadow:0 1px 4px var(--shadow-sm);
    position:sticky;top:calc(18px * var(--inv-zoom,1));max-height:calc((100vh - 36px) * var(--inv-zoom,1));display:flex;flex-direction:column;min-height:0}
  .side #list{flex:1 1 auto;min-height:0;overflow-y:auto;padding-bottom:6px;scrollbar-width:thin;overscroll-behavior:contain}
  .side #list::-webkit-scrollbar{width:8px}
  .side #list::-webkit-scrollbar-thumb{background:var(--line);border-radius:999px}
  .side #list::-webkit-scrollbar-track{background:transparent}
  /* 手機專用元素:預設(PC)隱藏;下方 media query 內才顯示 */
  .drawer-fab,.drawer-backdrop{display:none}
  .drawer-close{display:none;position:absolute;right:8px;top:8px;z-index:5;width:36px;height:36px;align-items:center;justify-content:center;
    background:var(--ground);border:1px solid var(--line);border-radius:10px;color:var(--mist);font-size:16px;cursor:pointer}
  /* ── 手機版(≤680px):側欄改為左側滑出「抽屜」──
     預設收起、圖表滿版;左下角 ☰ 按鈕開啟,選股後自動收合。
     PC 版樣式完全不受影響(全部包在 media query 內)。 */
  @media(max-width:680px){
    .side{position:fixed;left:0;top:0;bottom:0;width:min(320px,86vw);max-height:none;margin:0;
      border-radius:0 16px 16px 0;transform:translateX(-105%);transition:transform .25s ease;
      z-index:60;box-shadow:6px 0 28px var(--shadow-md);display:flex}
    body.drawer-open .side{transform:translateX(0)}
    body.drawer-open{overflow:hidden}                /* 抽屜開啟時鎖住背景捲動 */
    .side #list{overflow-y:auto;-webkit-overflow-scrolling:touch}
    /* 抽屜遮罩:點一下即關閉 */
    .drawer-backdrop{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:55}
    body.drawer-open .drawer-backdrop{display:block}
    /* 左下角浮動「清單」鈕 */
    .drawer-fab{position:fixed;left:12px;bottom:12px;z-index:50;display:flex;align-items:center;gap:7px;
      background:var(--accent);color:#fff;border:none;border-radius:999px;padding:12px 18px;
      font-size:14px;font-weight:700;font-family:inherit;box-shadow:0 4px 16px var(--shadow-md);cursor:pointer}
    body.drawer-open .drawer-fab{display:none}
    /* 字級/主題工具列:改貼右下角橫向,不再壓住內容 */
    .toolbar{left:auto;right:10px;top:auto;bottom:12px;transform:none;flex-direction:row;padding:4px 6px}
    .tb-actions{flex-direction:row}
    .fontctl{flex-direction:row}
    .theme-toggle{border-top:none;padding-top:0;margin-top:0;border-left:1px solid var(--line);border-radius:0 8px 8px 0;padding-left:6px;margin-left:2px}
    body{padding-bottom:76px}                        /* 幫底部兩顆浮動鈕留空間 */
    /* 觸控目標放大(Apple/Google 建議 ≥44px) */
    li{padding:12px 10px}
    li .x{font-size:18px;padding:8px 10px}
    li .nm{max-width:120px;font-size:11.5px}
    .tab{padding-top:12px;padding-bottom:12px}
    .drawer-close{display:flex}
  }
  /* Tab bar：每個分頁文字完整顯示；分頁太多時整條 tab bar 水平捲動，而不是把文字截斷 */
  .tabs-row{display:flex;align-items:stretch;overflow-x:auto;overflow-y:hidden;border-bottom:1px solid var(--line);scrollbar-width:thin;scrollbar-color:var(--line) transparent;background:var(--ground);overscroll-behavior-inline:contain;scroll-behavior:smooth}
  .tabs-row::-webkit-scrollbar{height:8px}
  .tabs-row::-webkit-scrollbar-thumb{background:var(--line);border-radius:999px}
  .tabs-row::-webkit-scrollbar-track{background:transparent}
  /* 柔和色盤:每個 tab 一個顏色,小圓點常駐顯示、選取時才用在底線/文字上,避免顏色太重 */
  .tab[data-color="slate"]  {--tabc:#8B97AC}
  .tab[data-color="sky"]    {--tabc:#3FA9D6}
  .tab[data-color="emerald"]{--tabc:#3FB37F}
  .tab[data-color="violet"] {--tabc:#9B87D6}
  .tab[data-color="rose"]   {--tabc:#E08AA0}
  .tab[data-color="teal"]   {--tabc:#3FB3A6}
  .tab[data-color="orange"] {--tabc:#E0A55C}
  .tab[data-color="indigo"] {--tabc:#7E8FE0}
  .tab{flex:0 0 auto;min-width:max-content;display:flex;align-items:center;justify-content:center;gap:5px;
    padding:9px 10px 8px;font-size:11.5px;font-weight:600;cursor:grab;border-bottom:2px solid transparent;
    color:var(--faint);white-space:nowrap;overflow:visible;text-overflow:clip;transition:color .15s,border-color .15s,background .15s;position:relative}
  .tab .tabdot{width:6px;height:6px;border-radius:50%;background:var(--tabc,var(--faint));flex-shrink:0;opacity:.75}
  .tab .lbl{flex:0 0 auto;overflow:visible;text-overflow:clip;max-width:none}
  .tab:hover{color:var(--mist)}
  .tab.active{color:var(--tabc,var(--accent));border-bottom-color:var(--tabc,var(--accent));background:var(--panel)}
  .tab.active .tabdot{opacity:1}
  .tab.drag-over{background:var(--accent-s)}
  .tab.dragging{opacity:.4}
  .tab input.tab-edit{width:clamp(90px, 100%, 220px);background:transparent;border:none;border-bottom:1px solid var(--accent);color:var(--paper);font:inherit;font-size:11.5px;text-align:center;outline:none;padding:0}
  .tab .tab-del{flex-shrink:0;color:var(--faint);font-size:12px;line-height:1;padding:1px 3px;border-radius:5px;cursor:pointer}
  .tab .tab-del:hover{color:var(--down);background:var(--down-s)}
  .tab-add{flex:0 0 auto;width:34px;min-width:34px;display:flex;align-items:center;justify-content:center;
    color:var(--faint);font-size:15px;font-weight:700;cursor:pointer;border-left:1px solid var(--line)}
  .tab-add:hover{color:var(--accent);background:var(--accent-s)}
  .add{display:flex;gap:6px;padding:10px 10px 4px}
  .add input{flex:1;min-width:0;background:var(--ground);border:1px solid var(--line);color:var(--paper);border-radius:8px;padding:7px 9px;font-family:"IBM Plex Mono",monospace;font-size:13px}
  .add input:focus{outline:none;border-color:var(--accent)}
  .add button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 11px;font-weight:700;font-size:17px;cursor:pointer;line-height:1}
  .add button:hover{background:#1d4ed8}
  .add button:disabled{opacity:.4;cursor:default}
  ul{list-style:none;padding:0 6px}
  li{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:9px;cursor:grab;border:1px solid transparent;user-select:none}
  li:hover{background:var(--ground)}
  li.active{background:var(--accent-s);border-color:var(--accent)}
  li.dragging{opacity:.3;cursor:grabbing}
  li.drag-over{border-top:2px solid var(--accent)}
  li .grip{color:var(--faint);font-size:12px;cursor:grab;padding:0 1px;flex-shrink:0}
  li .sym{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:14px;color:var(--paper)}
  li .li-id{display:flex;flex-direction:column;min-width:0;flex:1}
  li .nm{font-size:10.5px;color:var(--mist);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:78px}
  li .li-badges{display:flex;align-items:center;gap:5px;flex-shrink:0}
  li .zdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  li .zdot.loading{background:var(--line);animation:badgePulse 1.2s ease-in-out infinite}
  @keyframes badgePulse{0%,100%{opacity:.35}50%{opacity:1}}
  li .pebadge{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;padding:1px 5px;border-radius:5px;white-space:nowrap;line-height:1.4}
  li .pebadge.up{color:var(--up);background:var(--up-s)}
  li .pebadge.down{color:var(--down);background:var(--down-s)}
  li .pebadge.mid{color:var(--mist);background:var(--ground)}
  li .pebadge.none{display:none}
  li .x{margin-left:6px;color:var(--faint);border:none;background:none;cursor:pointer;font-size:15px;line-height:1;padding:2px 5px;border-radius:6px;flex-shrink:0}
  li .x:hover{color:var(--down);background:var(--down-s)}
  .err{color:var(--down);font-size:11.5px;padding:2px 14px 4px;min-height:16px}
  .results{display:none;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin:0 8px 6px;background:var(--panel);box-shadow:0 4px 12px var(--shadow-md)}
  .rrow{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--line)}
  .rrow:last-child{border-bottom:none}
  .rrow:hover{background:var(--accent-s)}
  .rrow .rc{font-family:"IBM Plex Mono",monospace;font-weight:600;min-width:46px;color:var(--accent)}
  .rrow .rn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rrow .rind{font-size:10.5px;color:var(--faint);white-space:nowrap}
  .rrow.direct{color:var(--accent);justify-content:center;font-size:12.5px}
  .rempty{padding:8px 10px;color:var(--faint);font-size:12px}
  /* 熱門股分頁:台股/美股切換,點哪個顯示哪個,另一邊收合 */
  li.hot-empty{color:var(--faint);font-size:12px;padding:6px 8px;cursor:default}
  .hot-toggle{padding:8px 4px 8px}
  .hot-toggle .seg{display:flex;width:100%}
  .hot-toggle .seg button{flex:1;display:flex;align-items:center;justify-content:center;gap:5px}
  .hot-toggle .seg button .cnt{font-family:"IBM Plex Mono",monospace;font-size:10px;opacity:.75}

  /* 個股詳情 */
  .main{display:flex;flex-direction:column;gap:14px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:var(--radius);padding:17px 18px;display:flex;flex-direction:column;gap:13px;box-shadow:0 1px 4px var(--shadow-sm)}
  .c-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .c-top .id{display:flex;align-items:baseline;gap:10px}.c-top .id .s{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:22px;color:var(--paper)}
  .sub2{font-size:12px;color:var(--mist);letter-spacing:.04em}
  .row2{display:grid;grid-template-columns:1fr 280px;gap:14px;align-items:start}
  @media(max-width:680px){.row2{grid-template-columns:1fr}}
  .subt2{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
  .col-chart{display:flex;flex-direction:column;gap:10px;min-width:0}
  .col-quad{display:flex;flex-direction:column;gap:10px}
  .col-quad .plot{max-width:100%;width:100%;margin:0}
  .info{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;border-top:1px solid var(--line);padding-top:11px}
  @media(max-width:560px){.info{grid-template-columns:1fr 1fr}}
  .ic{background:var(--ground);border:1px solid var(--line);border-radius:9px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
  .ic .ik{font-size:10px;letter-spacing:.06em;color:var(--faint);font-family:"IBM Plex Mono",monospace}
  .ic .iv{font-family:"IBM Plex Mono",monospace;font-size:14px;font-weight:600;color:var(--paper)}
  .badge{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--up);border:1px solid var(--up);border-radius:999px;padding:2px 9px;background:var(--up-s)}
  .pill{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;border:1px solid currentColor;border-radius:999px;padding:4px 13px}
  canvas{display:block;width:100%;height:auto;border-radius:8px;background:var(--ground)} /* 舊版 canvas fallback 保留;新版圖表改用 SVG 元件 */
  .chart-box{width:100%;min-width:0;border-radius:8px;background:var(--ground);overflow:hidden;position:relative}
  .manual-axis-line{position:absolute;top:36px;bottom:32px;width:1px;border-left:1px dashed var(--faint);opacity:.95;display:none;pointer-events:none;z-index:6}
  .manual-chart-tip{position:absolute;display:none;pointer-events:none;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px 10px;box-shadow:0 4px 14px var(--shadow-md);font-size:12px;min-width:142px;z-index:7}
  .manual-chart-tip .tip-date{font-family:"IBM Plex Mono",Menlo,monospace;font-size:11px;color:var(--mist);font-weight:700;margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--line)}
  .chart-trend{height:260px}
  .chart-pe{height:200px}
  .chart-fund{height:250px}

  /* 外部圖例按鈕:不要使用 ECharts 內建 legend hit-test,避免 .wrap zoom 後點擊座標偏移 */
  .chart-ext-legend{position:absolute;top:7px;right:8px;z-index:8;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--legend-bg);backdrop-filter:blur(2px);border-radius:8px;padding:1px 2px;line-height:1;pointer-events:auto}
  .chart-ext-legend .legend-btn{display:inline-flex;align-items:center;gap:5px;border:0;background:transparent;color:var(--mist);font-family:"Inter",system-ui,"PingFang TC","Microsoft JhengHei",sans-serif;font-size:11px;line-height:1.4;padding:3px 2px;border-radius:6px;cursor:pointer;user-select:none;white-space:nowrap}
  .chart-ext-legend .legend-btn:hover{background:var(--accent-s);color:var(--paper)}
  .chart-ext-legend .legend-btn.off{opacity:.42}
  .chart-ext-legend .lg-line{width:20px;height:10px;position:relative;display:inline-block;flex:0 0 auto}
  .chart-ext-legend .lg-line::before{content:"";position:absolute;left:0;right:0;top:50%;border-top:2px solid var(--lgc);transform:translateY(-50%)}
  .chart-ext-legend .lg-line::after{content:"";position:absolute;left:50%;top:50%;width:7px;height:7px;border:2px solid var(--lgc);background:var(--panel);border-radius:50%;transform:translate(-50%,-50%)}
  .chart-ext-legend .lg-bar{width:20px;height:12px;border-radius:3px;background:var(--lgc);opacity:.28;display:inline-block;flex:0 0 auto}
  .chart-empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:13px}
  .reads{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .read{background:var(--ground);border:1px solid var(--line);border-radius:10px;padding:10px 13px}
  .read .k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-family:"IBM Plex Mono",monospace}
  .read .v{font-family:"IBM Plex Mono",monospace;font-size:18px;font-weight:600;margin-top:3px}
  .up{color:var(--up)}.down{color:var(--down)}
  .sugg{border-top:1px dashed var(--line);padding-top:11px;font-size:13.5px;color:var(--mist)}
  .sugg .lead{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
  .tools{display:flex;gap:8px}
  .tools button{background:var(--ground);color:var(--mist);border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12px;cursor:pointer;font-family:inherit}
  .tools button:hover{color:var(--paper);border-color:var(--accent);background:var(--accent-s)}
  .status{color:var(--mist);font-size:13px;padding:30px 4px;text-align:center}
  .subt{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}

/* ── 後端 API 位址 ──
   前端在 GitHub Pages、後端在 Render,永遠是跨來源。
   本機開發(localhost/127.0.0.1)自動指向本機 Flask :5000;其餘一律指向線上 Render。
   若你之後換了 Render 網址,只要改下面這一行。 */

  : "https://stock-backend-jxz2.onrender.com";

/* ══════════════════════════════════════════════════════════════
   Store —— 觀察清單 / 分頁的本地儲存層(localStorage)
   後端已改為無狀態,清單完全由前端管理。
   getTabs() 回傳的結構刻意與舊 /api/tabs 完全一致:
     [{id,label,pos,kind,color,items:[{symbol,name,added_at}]}]
   讓原本的渲染程式幾乎不用改動。
   ══════════════════════════════════════════════════════════════ */
const Store = (()=>{
  const KEY="sv_watchlist_v1";
  const PALETTE=["slate","sky","emerald","violet","rose","teal","orange","indigo"];
  const now=()=>new Date().toISOString().slice(0,19);
  let state=null;

  function seed(){
    return { nextId:4, tabs:[
      {id:1,label:"自選清單",pos:0,kind:"normal",color:"sky",
       items:[{symbol:"2453",name:"凌群電腦",added_at:now()}]},
      {id:2,label:"觀察中",pos:1,kind:"normal",color:"emerald",items:[]},
      {id:3,label:"熱門股",pos:2,kind:"hot",color:"orange",items:[]},
    ]};
  }
  function load(){
    if(state) return state;
    try{ const s=JSON.parse(localStorage.getItem(KEY)); if(s&&Array.isArray(s.tabs)) state=s; }catch(e){}
    if(!state) state=seed();
    // 保險:確保一定有一個 hot 分頁(舊資料遷移用)
    if(!state.tabs.some(t=>t.kind==="hot")){
      const maxPos=state.tabs.reduce((m,t)=>Math.max(m,t.pos),-1)+1;
      state.tabs.push({id:state.nextId++,label:"熱門股",pos:maxPos,kind:"hot",color:"orange",items:[]});
    }
    return state;
  }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(load())); }catch(e){} }
  const tab=id=>load().tabs.find(t=>t.id===id);
  function nextColor(){
    const used=new Set(load().tabs.map(t=>t.color));
    return PALETTE.find(c=>!used.has(c)) || PALETTE[load().tabs.length % PALETTE.length];
  }
  function hasSymbol(sym){ return load().tabs.some(t=>(t.items||[]).some(w=>w.symbol===sym)); }

  return {
    hasSymbol,
    getTabs(){
      return load().tabs.slice().sort((a,b)=>a.pos-b.pos).map(t=>({
        id:t.id, label:t.label, pos:t.pos, kind:t.kind, color:t.color,
        items:(t.items||[]).map(w=>({symbol:w.symbol, name:w.name, added_at:w.added_at})),
      }));
    },
    createTab(label){
      const s=load(), id=s.nextId++;
      const pos=s.tabs.reduce((m,t)=>Math.max(m,t.pos),-1)+1;
      const color=nextColor();
      s.tabs.push({id,label:label||"新分頁",pos,kind:"normal",color,items:[]});
      save(); return {id,label:label||"新分頁",pos,kind:"normal",color};
    },
    deleteTab(id){
      const s=load(), t=tab(id);
      if(!t) return {error:"分頁不存在"};
      if(t.kind==="hot") return {error:"熱門股分頁不可刪除"};
      s.tabs=s.tabs.filter(x=>x.id!==id); save(); return {ok:true};
    },
    renameTab(id,label){ const t=tab(id); if(t){ t.label=label; save(); } },
    reorderTabs(order){ order.forEach((id,i)=>{ const t=tab(id); if(t) t.pos=i; }); save(); },
    addItem(sym,name,tabId){
      const s=load();
      if(hasSymbol(sym)) return {error:"已在清單中"};
      let t = tabId!=null ? tab(tabId) : null;
      if(!t) t = s.tabs.filter(x=>x.kind!=="hot").sort((a,b)=>a.pos-b.pos)[0] || s.tabs[0];
      (t.items=t.items||[]).push({symbol:sym, name:name||sym, added_at:now()});
      save(); return {ok:true};
    },
    deleteItem(sym){
      load().tabs.forEach(t=> t.items=(t.items||[]).filter(w=>w.symbol!==sym));
      save();
    },
    moveItem(sym,toTabId){
      const s=load(); let moved=null;
      s.tabs.forEach(t=>{ const i=(t.items||[]).findIndex(w=>w.symbol===sym);
        if(i>=0) moved=t.items.splice(i,1)[0]; });
      const dest=tab(toTabId);
      if(dest&&moved){ (dest.items=dest.items||[]).push(moved); }
      save();
    },
    reorderItems(tabId,order){
      const t=tab(tabId); if(!t) return;
      const by={}; (t.items||[]).forEach(w=>by[w.symbol]=w);
      const rest=(t.items||[]).filter(w=>!order.includes(w.symbol));
      t.items = order.map(s=>by[s]).filter(Boolean).concat(rest);
      save();
    },
    /* 熱門股:用後端 /api/hot 回傳的清單覆蓋 hot 分頁;
       已存在於使用者其他分頁的代號會跳過,不動使用者整理好的清單。 */
    setHotItems(rows){
      const s=load(); const hot=s.tabs.find(t=>t.kind==="hot"); if(!hot) return;
      const ownedElsewhere=new Set();
      s.tabs.forEach(t=>{ if(t.kind!=="hot") (t.items||[]).forEach(w=>ownedElsewhere.add(w.symbol)); });
      hot.items = (rows||[]).filter(r=>!ownedElsewhere.has(r.symbol))
                            .map(r=>({symbol:r.symbol, name:r.name, added_at:now()}));
      save();
    },
    /* 匯出/匯入:換裝置或清瀏覽器前備份用 */
    exportJSON(){ return JSON.stringify(load(), null, 2); },
    importJSON(text){
      const s=JSON.parse(text);
      if(!s||!Array.isArray(s.tabs)) throw "格式不正確";
      state=s; save();
    },
  };
})();

/* ── 黑色系 / 白色系切換,localStorage 持久化 ── */
const THEME_KEY="sv_theme";
function loadTheme(){
  try{ return localStorage.getItem(THEME_KEY)==="dark" ? "dark" : "light"; }catch(e){ return "light"; }
}
function applyTheme(theme, rerender=true){
  theme = theme==="dark" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", theme);
  const btn=document.getElementById("theme-toggle");
  if(btn){
    btn.textContent = theme==="dark" ? "☀" : "🌙";
    btn.title = theme==="dark" ? "切換白色系" : "切換黑色系";
    btn.setAttribute("aria-label", btn.title);
    btn.setAttribute("aria-pressed", theme==="dark" ? "true" : "false");
  }
  try{ localStorage.setItem(THEME_KEY, theme); }catch(e){}
  if(rerender && currentData){
    const keepView=activeView;
    requestAnimationFrame(()=>{ activeView=keepView; renderStock(currentData); });
  }else{
    requestAnimationFrame(()=>requestAnimationFrame(resizeAllCharts));
  }
}

let tabs=[], currentTab=null, current=null, currentData=null, activeView="trend";

/* ── Tab 渲染 ── */
function renderTabs(){
  const row=document.getElementById("tabs-row");
  row.innerHTML = tabs.map(t=>`
    <div class="tab${t.id===currentTab?' active':''}" draggable="true" data-tid="${t.id}" data-color="${t.color||'slate'}" title="${escH(t.label)}">
      <span class="tabdot"></span><span class="lbl">${escH(t.label)}</span>
      ${t.kind!=='hot' ? `<span class="tab-del" data-del-tab="${t.id}" title="刪除分頁">×</span>` : ""}
    </div>`).join("")
    + `<div class="tab-add" id="tab-add" title="新增分頁">＋</div>`;

  document.querySelectorAll(".tab").forEach(el=>{
    let clickTimer=null;
    el.addEventListener("click", e=>{
      if(e.target.dataset.delTab!==undefined) return;     // 交給刪除按鈕自己的 handler
      if(el.querySelector("input")) return;                // 編輯中忽略
      // 用 timer 區分單擊 vs 雙擊,避免 dblclick 前先 re-render
      if(clickTimer){ clearTimeout(clickTimer); clickTimer=null; return; }
      clickTimer=setTimeout(()=>{ clickTimer=null; switchTab(el.dataset.tid|0); },220);
    });
    el.addEventListener("dblclick", e=>{
      if(clickTimer){ clearTimeout(clickTimer); clickTimer=null; }
      if(el.querySelector("input")) return;
      startRenameTab(el);
    });
    const delBtn=el.querySelector(".tab-del");
    if(delBtn) delBtn.addEventListener("click", e=>{ e.stopPropagation(); deleteTab(el.dataset.tid|0); });

    /* tab 互相拖曳調換順序 */
    el.addEventListener("dragstart", e=>{
      if(el.querySelector("input")){ e.preventDefault(); return; }  // 編輯中不可拖
      window._dragTabId=el.dataset.tid|0; window._dragSym=null;
      e.dataTransfer.effectAllowed="move";
      setTimeout(()=>el.classList.add("dragging"),0);
    });
    el.addEventListener("dragend", ()=>{ el.classList.remove("dragging"); window._dragTabId=null; });
    el.addEventListener("dragover",  e=>{ e.preventDefault(); el.classList.add("drag-over"); });
    el.addEventListener("dragleave", ()=> el.classList.remove("drag-over"));
    el.addEventListener("drop", e=>{
      e.preventDefault(); el.classList.remove("drag-over");
      const targetTid=el.dataset.tid|0;
      if(window._dragTabId!=null){ reorderTabs(window._dragTabId, targetTid); window._dragTabId=null; return; }
      dropToTab(targetTid);                                  // 拖的是股票項目,沿用原本邏輯
    });
  });

  const addBtn=document.getElementById("tab-add");
  if(addBtn) addBtn.addEventListener("click", createTab);
  bindTabBarScroll(row);
  requestAnimationFrame(scrollActiveTabIntoView);
}

function bindTabBarScroll(row){
  if(!row || row.dataset.scrollBound==="1") return;
  row.dataset.scrollBound="1";
  // Tab bar 本身水平捲動；一般滑鼠滾輪在這裡也轉成左右捲，避免分頁多時難操作。
  row.addEventListener("wheel", e=>{
    if(Math.abs(e.deltaY) <= Math.abs(e.deltaX)) return;
    if(row.scrollWidth <= row.clientWidth) return;
    e.preventDefault();
    row.scrollLeft += e.deltaY;
  }, {passive:false});
}
function scrollActiveTabIntoView(){
  const active=document.querySelector(".tab.active");
  if(active) active.scrollIntoView({inline:"nearest", block:"nearest", behavior:"smooth"});
}

async function reorderTabs(fromId, toId){
  if(fromId===toId) return;
  const order=tabs.map(t=>t.id);
  const fi=order.indexOf(fromId), ti=order.indexOf(toId);
  if(fi<0||ti<0) return;
  order.splice(fi,1); order.splice(ti,0,fromId);
  Store.reorderTabs(order);
  await loadAll();
}

async function createTab(){
  const r=Store.createTab("新分頁");
  await loadAll();
  currentTab=r.id; renderTabs(); renderList();
  const el=document.querySelector(`.tab[data-tid="${r.id}"]`);
  if(el) startRenameTab(el);                                 // 新增後直接進入改名模式,方便立刻命名
}

async function deleteTab(tid){
  const t=tabs.find(x=>x.id===tid); if(!t) return;
  const n=(t.items||[]).length;
  const msg = n>0
    ? `刪除分頁「${t.label}」?裡面的 ${n} 檔股票也會一併移除,此動作無法復原。`
    : `刪除分頁「${t.label}」?`;
  if(!confirm(msg)) return;
  const r=Store.deleteTab(tid);
  if(r&&r.error){ alert(`刪除失敗:${r.error}`); return; }
  if(currentTab===tid) currentTab=null;
  await loadAll();
  if(!currentTab){
    const first=tabs[0]; if(first){ currentTab=first.id; renderTabs(); }
    const firstItem=currentItems()[0];
    if(firstItem) select(firstItem.symbol); else showStatus("左邊輸入代號或名稱開始。");
  }
}

function startRenameTab(el){
  const tid=el.dataset.tid|0, t=tabs.find(x=>x.id===tid);
  if(!t) return;
  el.innerHTML=`<input class="tab-edit" value="${escH(t.label)}" maxlength="12">`;
  const inp=el.querySelector("input");
  inp.focus(); inp.select();
  let saved=false;
  const done=async()=>{
    if(saved) return; saved=true;
    const lbl=inp.value.trim()||t.label;
    Store.renameTab(tid, lbl);
    await loadAll();
  };
  inp.addEventListener("blur", done);
  inp.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); inp.blur(); }
                                        if(e.key==="Escape"){ saved=true; loadAll(); } });
}

function dropToTab(tid){
  // 從清單拖過來的 sym 存在 window._dragSym
  const sym=window._dragSym; if(!sym) return;
  if(tid===currentTab) return;
  Store.moveItem(sym, tid);
  loadAll();
}

function switchTab(tid){ currentTab=tid; renderTabs(); renderList(); }

  const hot=isHotTab();

  // 第三個「熱門股」分頁:不顯示新增框,改顯示更新時間 + 手動重新整理按鈕,並用切換鈕分台股/美股

  if(hot){

    const us=items.filter(w=>!/^\d+$/.test(w.symbol));
    const market=getHotMarket();
    const shown = market==="tw" ? tw : us;
    ul.innerHTML = `
      <li class="hot-toggle">
        <div class="seg">
          <button data-mk="tw" class="${market==='tw'?'active':''}">台股 <span class="cnt">${tw.length}</span></button>

    li.addEventListener("click", e=>{ if(e.target.dataset.del) return; select(li.dataset.sym); });
    li.querySelector(".x").addEventListener("click", e=>{ e.stopPropagation(); del(li.dataset.sym); });

    /* 同 tab 排序拖曳 */
    li.addEventListener("dragstart", e=>{
      draggingSym=li.dataset.sym; window._dragSym=li.dataset.sym; window._dragTabId=null;
      e.dataTransfer.effectAllowed="move";

/* ══════════════════════════════════════════════════════════════
   系統狀態通知:右上角滑入式 toast,支援即時進度條
   用法:
     const t = toast("訊息");            // 一般通知(3秒後自動消失)
     const t = toast("載入中…", 0);       // 持續中(不自動消失)
     t.progress(0.4);                    // 更新到 40%
     t.done("完成!");                     // 標示完成並 3 秒後消失
     t.err("失敗");                       // 標示錯誤並 3 秒後消失
   ══════════════════════════════════════════════════════════════ */
function toast(msg, autoDismiss=3000){
  const stack=document.getElementById("toast-stack");
  const el=document.createElement("div");
  el.className="toast";
  el.innerHTML=`<div class="toast-msg"></div><div class="toast-bar-wrap"><div class="toast-bar"></div></div>`;
  const msgEl=el.querySelector(".toast-msg");
  const barWrap=el.querySelector(".toast-bar-wrap");
  const bar=el.querySelector(".toast-bar");
  msgEl.textContent=msg;
  stack.appendChild(el);
  // 下一幀再加 .show,讓 CSS transition 能觸發
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add("show")));
  let timer=null;
  function dismiss(){ el.classList.remove("show"); setTimeout(()=>el.remove(), 350); }
  if(autoDismiss>0) timer=setTimeout(dismiss, autoDismiss);
  return {
    progress(pct, label){
      if(timer){ clearTimeout(timer); timer=null; }
      msgEl.textContent = label || msg;
      barWrap.classList.add("vis");
      bar.style.width=(Math.min(1,pct)*100).toFixed(1)+"%";
    },
    done(label){
      el.classList.add("done"); bar.style.width="100%"; barWrap.classList.add("vis");
      if(label) msgEl.textContent=label;
      if(timer) clearTimeout(timer);
      timer=setTimeout(dismiss, 2500);
    },
    err(label){
      el.classList.add("err"); barWrap.classList.add("vis");
      if(label) msgEl.textContent=label;
      if(timer) clearTimeout(timer);
      timer=setTimeout(dismiss, 4000);
    },
    dismiss,
  };
}

/* ══════════════════════════════════════════════════════════════
   背景預載器:頁面連線後自動抓取所有清單個股的完整資料
   讓用戶點選時直接命中快取,不必再等待。

   分兩個 pass:
     Pass 1  —  badge 輕量版(預設2年),讓清單徽章盡快出現  ← 已由 enqueueBadges 處理
     Pass 2  —  完整版(15年),讓 select() 時直接命中 _cache ← 這裡新增
   兩個 pass 用同一個 toast 連續顯示進度。
   ══════════════════════════════════════════════════════════════ */
async function preloadAll(symbols){
  if(!symbols||!symbols.length) return;
  // Pass 2:補齊 15 年完整版快取(供 select/圖表用)
  // 跳過已經在 _cache 裡的(可能是上次 session 中使用者已手動點選過的快取)
  const need=symbols.filter(s=>!_preloadDone.has(s));
  if(!need.length) return;
  const t=toast(`預載資料中 1/${need.length}`, 0);
  t.progress(0,"預載資料中…");
  let done=0;
  for(const sym of need){
    try{
      await api(`/api/stock/${sym}?years=15`);   // 打 API → 後端 _cache 已記住
      _preloadDone.add(sym);
    }catch(e){ /* 個別失敗不影響整體,繼續往下 */ }
    done++;
    const pct=done/need.length;
    t.progress(pct, `預載資料中 ${done}/${need.length}`);
    await sleep(200);   // 對後端禮貌,避免一次打爆
  }
  t.done(`資料預載完成(${need.length} 檔)`);
}
const _preloadDone=new Set();

const badgeCache={};   // key = "symbol:months"
let badgeQueue=[], badgeQueued=new Set(), badgeRunning=false;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function computeBadge(d, months){
  const fullN=d.closes.length;
  const targetDays=Math.round(252*(months||getPeriodMonths())/12);
  const winLen=Math.max(10, Math.min(fullN, targetDays));
  const P=d.closes.slice(fullN-winLen);
  const f=fit(P,winLen);
  const slopeA=Math.exp(f.b*252)-1, midNow=Math.exp(f.a+f.b*(winLen-1)), dev=P[winLen-1]/midNow-1;
  const z=quad(slopeA,dev);
  const pe=d.info&&d.info.pe;
  let peState="none", peLabel="—";
  if(pe!=null && !isNaN(pe) && pe>0){
    const thr=20; // 與本益比評估頁預設門檻一致
    peState = pe>thr*1.2 ? "down" : pe<thr*0.8 ? "up" : "mid";
    peLabel = pe.toFixed(1)+"×";
  }
  return {zoneName:z.name, zoneColor:css(z.c), peLabel, peState};
}

function badgeKey(sym){ return sym+":"+getPeriodMonths(); }

function renderBadgeHTML(sym){
  const b=badgeCache[badgeKey(sym)];
  if(!b) return `<span class="zdot loading" title="載入中…"></span>`;
  if(b.error) return `<span class="zdot" style="background:var(--faint)" title="無法取得資料"></span>`;
  return `<span class="zdot" style="background:${b.zoneColor}" title="${b.zoneName}"></span>
          <span class="pebadge ${b.peState}" title="本益比">${b.peLabel}</span>`;
}

// 只更新徽章那一小段 innerHTML,不動 <li> 本身、不重綁事件 → 不影響 click / 拖曳
function patchListBadge(sym){
  const el=document.querySelector(`.li-badges[data-badge="${sym}"]`);
  if(el) el.innerHTML=renderBadgeHTML(sym);
}

function enqueueBadges(symbols){
  const months=getPeriodMonths();
  for(const s of symbols){
    const key=s+":"+months;
    if(badgeCache[key] || badgeQueued.has(key)) continue;
    badgeQueued.add(key); badgeQueue.push({sym:s, months});
  }
  runBadgeLoader();
}

async function runBadgeLoader(){
  if(badgeRunning) return;
  badgeRunning=true;
  while(badgeQueue.length){
    const {sym, months}=badgeQueue.shift();
    const key=sym+":"+months;
    badgeQueued.delete(key);
    try{
      const d=await api(`/api/stock/${sym}`);
      badgeCache[key]=computeBadge(d, months);
    }catch(e){
      badgeCache[key]={error:true};
    }
    patchListBadge(sym);   // 只 patch 當前可見 tab 的那一列;其他 tab 切過去時 renderList 會用最新快取重繪
    await sleep(150);
  }
  badgeRunning=false;
}

async function loadAll(){
  tabs = Store.getTabs();
  if(!currentTab || !tabs.find(t=>t.id===currentTab)) currentTab=tabs[0]?.id||null;

function fit(P,N){const y=P.map(Math.log);let sx=0,sy=0,sxy=0,sxx=0;for(let i=0;i<N;i++){sx+=i;sy+=y[i];sxy+=i*y[i];sxx+=i*i;}const b=(N*sxy-sx*sy)/(N*sxx-sx*sx),a=(sy-b*sx)/N;let ss=0;for(let i=0;i<N;i++){const r=y[i]-(a+b*i);ss+=r*r;}return{a,b,sigma:Math.sqrt(ss/N)};}
function quad(s,d){const up=s>0,cheap=d<0;return up?(cheap?ZONE.acc:ZONE.hold):(cheap?ZONE.wait:ZONE.trim);}
function fmtNum(v,d=1){return (v==null||isNaN(v))?"—":Number(v).toFixed(d);}
function fmtPct(v){if(v==null||isNaN(v))return "—";const x=v<1?v*100:v;return x.toFixed(2)+"%";}
function fmtCap(v,cur){if(v==null||isNaN(v))return "—";
  if(cur==="TWD")return (v/1e8).toFixed(1)+" 億";
  for(const [s,m] of [["T",1e12],["B",1e9],["M",1e6]]) if(v>=m) return (v/m).toFixed(2)+s+(cur?(" "+cur):"");
  return String(v);}

  // chart-tab 切換
  const setChartView=(view)=>{
    activeView = ["trend","pe","funds"].includes(view) ? view : "trend";
    document.querySelectorAll(".ctab").forEach(b=>b.classList.toggle("active", b.dataset.view===activeView));

    document.getElementById("view-funds").style.display = activeView==="funds"?"":"none";
    if(activeView==="pe") drawPE(I, +document.getElementById("thr-slider").value);

    requestAnimationFrame(()=>requestAnimationFrame(resizeAllCharts));
  };
  document.querySelectorAll(".ctab").forEach(btn=>{
    btn.addEventListener("click",()=>setChartView(btn.dataset.view));
  });

  // 季線/年線/十年線/趨勢線 顯示切換(持久化於 localStorage)
  document.querySelectorAll("#ma-toggles .machip").forEach(chip=>{
    const key=chip.dataset.ma, cb=chip.querySelector("input");
    cb.checked = getMaVisible(key);
    cb.addEventListener("change", ()=>{ setMaVisible(key, cb.checked); applyPeriod(getPeriodMonths()); });
  });

  // 顯示期間切換(1月~5年):只是改變要顯示/迴歸的資料範圍,底層資料已含 15 年,不必重新抓取
  document.querySelectorAll("#period-seg button").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const mo=+btn.dataset.m; setPeriodMonths(mo); applyPeriod(mo);
      // 週期改變 → 當前可見清單的燈號要跟著新週期重算。
      // 全程用 patch(只改徽章那一小段 innerHTML)不重繪清單,不影響 hover / click / 拖曳。
      const visible=[...document.querySelectorAll('.li-badges[data-badge]')].map(el=>el.getAttribute('data-badge'));
      visible.forEach(sym=>{ const el=document.querySelector(`.li-badges[data-badge="${sym}"]`);
        if(el && !badgeCache[badgeKey(sym)]) el.innerHTML=`<span class="zdot loading" title="載入中…"></span>`; });
      enqueueBadges(visible);
    });
  });

  document.getElementById("refresh").addEventListener("click",()=>{ delete fundsCache[d.symbol]; select(d.symbol,true); });

  /* 依選定期間(月)重新計算迴歸/MA/落點,並更新畫面(不重新抓取資料) */
  function applyPeriod(months){
    document.querySelectorAll("#period-seg button").forEach(b=>b.classList.toggle("active", +b.dataset.m===months));
    const fullCloses=d.closes, fullN=fullCloses.length;
    const targetDays=Math.round(252*months/12);
    const winLen=Math.max(10, Math.min(fullN, targetDays));
    const P=fullCloses.slice(fullN-winLen);
    const ff=fit(P,winLen);
    const slopeA2=Math.exp(ff.b*252)-1, midNow2=Math.exp(ff.a+ff.b*(winLen-1)), dev2=P[winLen-1]/midNow2-1;
    const z2=quad(slopeA2,dev2), col2=css(z2.c);

    const rs=document.getElementById("read-slope");
    rs.textContent=(slopeA2>0?'↑向上 +':'↓向下 ')+(Math.abs(slopeA2)*100).toFixed(0)+"%";
    rs.className="v "+(slopeA2>0?"up":"down");
    const rd=document.getElementById("read-dev");
    rd.textContent=(dev2<0?'便宜 ':'偏貴 ')+Math.abs(dev2*100).toFixed(0)+"%";
    rd.className="v "+(dev2<0?"up":"down");

    const pill=document.getElementById("zone-pill");
    pill.textContent=z2.name; pill.style.color=col2;
    document.getElementById("sugg-text").textContent=z2.why;

    const plot=document.getElementById("plot");
    plot.querySelectorAll(".dot").forEach(el=>el.remove());
    const px=Math.max(10,Math.min(90,50+(dev2/0.20)*40)), py=Math.max(10,Math.min(90,50-(slopeA2/0.25)*40));
    const dd=document.createElement("div");dd.className="dot";dd.style.left=px+"%";dd.style.top=py+"%";
    dd.innerHTML=`<span class="lab" style="color:${col2}">${d.symbol}</span><span class="pt" style="background:${col2}"></span>`;
    plot.appendChild(dd);

    renderTrendChart(fullCloses, d.dates, winLen, ff, col2);
  }

  applyPeriod(getPeriodMonths());

  // 綁定門檻滑桿(即時重繪)
  document.getElementById("thr-slider").addEventListener("input", function(){
    document.getElementById("thr-val").textContent=this.value;
    drawPE(I,+this.value);
  });

  setChartView(activeView);

}

/* ── SVG 圖表引擎:所有圖表改用 ECharts + SVG renderer,不再把文字畫死在 canvas 上 ── */
const _echarts = new Map();
const _chartRO = new Map();
const _manualTooltipCleanup = new Map();

function safeColor(v, fallback){
  const x = css(v);
  return x || fallback || "#2563EB";
}
function chartTextStyle(size=11, colorVar="--mist"){
  return {fontFamily:"Inter, PingFang TC, Microsoft JhengHei, sans-serif", fontSize:size, color:safeColor(colorVar,"#5A6A7E")};
}
function chartMonoStyle(size=10, colorVar="--faint"){
  return {fontFamily:"IBM Plex Mono, Menlo, monospace", fontSize:size, color:safeColor(colorVar,"#9BA8B8")};
}
function getChart(id){
  const el=document.getElementById(id);
  if(!el) return null;
  if(!window.echarts){
    el.innerHTML=`<div class="chart-empty">圖表元件載入失敗,請確認 echarts.min.js 是否可讀取</div>`;
    return null;
  }
  let chart=_echarts.get(id);
  if(chart && chart.getDom && chart.getDom()!==el){
    try{chart.dispose();}catch(e){}
    chart=null;
    _echarts.delete(id);
    const oldRO=_chartRO.get(id);
    if(oldRO){ try{oldRO.disconnect();}catch(e){} _chartRO.delete(id); }
    const oldTip=_manualTooltipCleanup.get(id);
    if(oldTip){ try{oldTip();}catch(e){} _manualTooltipCleanup.delete(id); }
  }
  if(!chart){
    chart=echarts.init(el, null, {renderer:"svg"});
    _echarts.set(id, chart);
    const ro=new ResizeObserver(()=>chart.resize());
    ro.observe(el);
    _chartRO.set(id, ro);
  }
  return chart;
}
function resizeAllCharts(){
  _echarts.forEach(chart=>{ try{chart.resize();}catch(e){} });
}
function renderEmptyChart(id, msg){
  const el=document.getElementById(id);
  if(!el) return;
  const chart=_echarts.get(id);
  if(chart){ try{chart.clear();}catch(e){} }
  el.innerHTML=`<div class="chart-empty">${escH(msg)}</div>`;
}
function bindManualCategoryTooltip(id, dataCount, opt={}){
  const chart=_echarts.get(id);
  if(!chart || !dataCount) return;
  const el=chart.getDom();
  if(!el) return;
  const old=_manualTooltipCleanup.get(id);
  if(old){ try{old();}catch(e){} }

  const grid=Object.assign({left:0,right:0}, opt.grid||{});
  const boundaryGap=!!opt.boundaryGap;
  const seriesIndex=opt.seriesIndex || 0;
  // 預設只顯示 tooltip，不觸發 ECharts highlight/emphasis。
  // 在 .wrap 使用 zoom 時，我們已經手動校正 showTip 的 dataIndex；若再 highlight 某一條線，
  // ECharts 會把其他 series 進入 blur 狀態，造成季線/年線/十年線 hover 時變淡。
  const doHighlight = opt.highlight === true;

  const pickIndex=(clientX)=>{
    const rect=el.getBoundingClientRect();
    const chartW=Math.max(1, chart.getWidth ? chart.getWidth() : el.clientWidth || rect.width || 1);
    const scale=(rect.width && chartW) ? rect.width/chartW : 1;
    const x=(clientX-rect.left)/Math.max(scale, 0.0001);
    const left=+grid.left || 0;
    const right=chartW-(+grid.right || 0);
    const plotW=Math.max(1, right-left);
    let idx;
    if(boundaryGap){
      const band=plotW/Math.max(1, dataCount);
      idx=Math.floor((x-left)/band);
    }else{
      idx=dataCount<=1 ? 0 : Math.round((x-left)/plotW*(dataCount-1));
    }
    return Math.max(0, Math.min(dataCount-1, idx));
  };

  let lastIdx = -1;
  const move=(e)=>{
    const idx=pickIndex(e.clientX);
    try{
      if(doHighlight && lastIdx >= 0 && lastIdx !== idx){
        chart.dispatchAction({type:"downplay", seriesIndex, dataIndex:lastIdx});
      }
      chart.dispatchAction({type:"showTip", seriesIndex, dataIndex:idx});
      if(doHighlight){ chart.dispatchAction({type:"highlight", seriesIndex, dataIndex:idx}); }
      lastIdx = idx;
    }catch(err){}
  };
  const leave=()=>{
    try{
      chart.dispatchAction({type:"hideTip"});
      if(doHighlight && lastIdx >= 0){ chart.dispatchAction({type:"downplay", seriesIndex, dataIndex:lastIdx}); }
      lastIdx = -1;
    }catch(err){}
  };

  el.addEventListener("mousemove", move, {passive:true});
  el.addEventListener("mouseleave", leave, {passive:true});
  _manualTooltipCleanup.set(id, ()=>{
    el.removeEventListener("mousemove", move);
    el.removeEventListener("mouseleave", leave);
  });
}

function bindManualTrendTooltip(id, dates, rows, opt={}){
  const chart=_echarts.get(id);
  if(!chart || !dates || !dates.length) return;
  const el=chart.getDom();
  if(!el) return;
  const old=_manualTooltipCleanup.get(id);
  if(old){ try{old();}catch(e){} }

  const grid=Object.assign({left:48,right:14,top:36,bottom:32}, opt.grid||{});
  const line=document.createElement("div");
  line.className="manual-axis-line";
  const tip=document.createElement("div");
  tip.className="manual-chart-tip";
  el.appendChild(line);
  el.appendChild(tip);

  const chartMetric=()=>{
    const rect=el.getBoundingClientRect();
    const W=Math.max(1, chart.getWidth ? chart.getWidth() : el.clientWidth || rect.width || 1);
    const H=Math.max(1, chart.getHeight ? chart.getHeight() : el.clientHeight || rect.height || 1);
    const scale=(rect.width && W) ? rect.width/W : 1;
    const left=+grid.left || 0, right=W-(+grid.right || 0);
    const top=+grid.top || 0, bottom=H-(+grid.bottom || 0);
    const plotW=Math.max(1,right-left);
    return {rect,W,H,scale,left,right,top,bottom,plotW};
  };
  const pickIndex=(clientX)=>{
    const m=chartMetric();
    const x=(clientX-m.rect.left)/Math.max(m.scale,0.0001);
    const idx=dates.length<=1 ? 0 : Math.round((x-m.left)/m.plotW*(dates.length-1));
    return Math.max(0, Math.min(dates.length-1, idx));
  };

  const move=(e)=>{
    const m=chartMetric();
    const idx=pickIndex(e.clientX);
    const x=dates.length<=1 ? (m.left+m.plotW/2) : m.left + m.plotW*idx/(dates.length-1);
    const y=(e.clientY-m.rect.top)/Math.max(m.scale,0.0001);
    line.style.display="block";
    line.style.left=x+"px";
    line.style.top=m.top+"px";
    line.style.bottom=(m.H-m.bottom)+"px";

    const html=[`<div class="tip-date">${escH(dates[idx]||"")}</div>`];
    rows.forEach(r=>{
      if(!r || r.hidden) return;
      const val=Array.isArray(r.data) ? r.data[idx] : null;
      html.push(tipRowText(r.name, fmtChartPrice(val), r.color, !!r.bold));
    });
    tip.innerHTML=html.join("");
    tip.style.display="block";

    // 先放右側,若超出圖表就翻到左側;Y 軸跟隨游標但限制在圖內。
    const tw=tip.offsetWidth || 150, th=tip.offsetHeight || 120;
    let tx=x+12;
    if(tx+tw+8>m.W) tx=x-tw-12;
    tx=Math.max(6, Math.min(m.W-tw-6, tx));
    let ty=y-th/2;
    ty=Math.max(6, Math.min(m.H-th-6, ty));
    tip.style.left=tx+"px";
    tip.style.top=ty+"px";
  };
  const leave=()=>{
    line.style.display="none";
    tip.style.display="none";
  };

  el.addEventListener("mousemove", move, {passive:true});
  el.addEventListener("mouseleave", leave, {passive:true});
  _manualTooltipCleanup.set(id, ()=>{
    el.removeEventListener("mousemove", move);
    el.removeEventListener("mouseleave", leave);
    try{ line.remove(); tip.remove(); }catch(e){}
  });
}

function fmtChartPrice(v){
  return (v==null||isNaN(v)) ? "—" : Number(v).toFixed(2);
}
function fmtChartDateLabel(v){
  const t=String(v||"");
  return /^\d{4}-\d{2}-\d{2}$/.test(t) ? t.slice(5) : t;
}
function visibleSeriesName(name){ return {name, textStyle:chartTextStyle(11)}; }

function tipRowText(label, val, color, bold){
  const c = String(color || safeColor("--mist", "#5A6A7E")).replace(/[<>"']/g, "");
  const v = (val == null || val === "") ? "—" : String(val);
  return `<div style="display:flex;align-items:center;gap:6px;padding:2px 0;white-space:nowrap;">`
       + `<span style="width:7px;height:7px;border-radius:50%;background:${c};display:inline-block;flex:0 0 auto;"></span>`
       + `<span style="color:${safeColor("--mist", "#5A6A7E")};flex:1;min-width:64px;">${escH(label)}</span>`
       + `<span style="color:${safeColor("--paper", "#1A2332")};font-family:'IBM Plex Mono',Menlo,monospace;font-weight:${bold?700:600};">${escH(v)}</span>`
       + `</div>`;
}

function renderTrendChart(fullCloses, fullDates, winLen, f, col){
  const fullN=fullCloses.length, N=winLen, offset=fullN-winLen;
  const P=fullCloses.slice(offset).map(v=>Number(v));
  const dates=(fullDates||[]).slice(offset);
  if(!N || !P.length){ renderEmptyChart("trend-chart", "沒有足夠資料可繪圖"); return; }

  // MA 一律用完整 15 年歷史計算,再裁切顯示視窗;這樣只看短週期時,年線/十年線也不會從空白開始。
  const maFull=(period)=>{
    const out=Array(fullN).fill(null); let sum=0;
    for(let i=0;i<fullN;i++){
      sum+=Number(fullCloses[i]);
      if(i>=period) sum-=Number(fullCloses[i-period]);
      if(i>=period-1) out[i]=+(sum/period).toFixed(2);
    }
    return out.slice(offset);
  };
  const mid=[], up=[], lo=[];
  for(let k=0;k<N;k++){
    const m=f.a+f.b*k;
    mid[k]=+Math.exp(m).toFixed(2);
    up[k]=+Math.exp(m+f.sigma).toFixed(2);
    lo[k]=+Math.exp(m-f.sigma).toFixed(2);
  }

  const showTrend=getMaVisible("trend"), showMa60=getMaVisible("ma60"), showMa240=getMaVisible("ma240"), showMa2400=getMaVisible("ma2400");
  const ma60=maFull(60), ma240=maFull(240), ma2400=maFull(2400);
  const legend=[];
  const series=[];

  series.push({
    name:"價格", type:"line", data:P, showSymbol:false, smooth:false,
    lineStyle:{width:1.8,color:safeColor("--price-line","#1A2332")}, itemStyle:{color:safeColor("--price-line","#1A2332")}, z:4,
    silent:true, hoverAnimation:false, legendHoverLink:false,
    emphasis:{disabled:true, focus:"none", lineStyle:{opacity:1,width:1.8}}, blur:{lineStyle:{opacity:1}},
    markPoint:{
      symbol:"circle", symbolSize:11,
      itemStyle:{color:col,borderColor:safeColor("--point-border","#fff"),borderWidth:2},
      label:{show:false},
      data:[{coord:[dates[N-1], P[N-1]], name:"目前"}]
    }
  });
  legend.push("價格");

  if(showTrend){
    // 趨勢帶:用兩條 stack line 形成「下緣 ~ 上緣」之間的填色區。
    // 相較原本只有淡淡邊界線,這裡加深填色與邊界,但仍保持在價格線/MA 線後方。
    const bandBase=lo.map(v=>Number.isFinite(v)?v:null);
    const bandGap=up.map((v,i)=>(Number.isFinite(v)&&Number.isFinite(lo[i]))?+(v-lo[i]).toFixed(2):null);
    series.push({name:"趨勢帶基準", type:"line", data:bandBase, stack:"trendBand", showSymbol:false, smooth:false,
      lineStyle:{width:0,opacity:0}, itemStyle:{opacity:0}, areaStyle:{opacity:0},
      silent:true, tooltip:{show:false}, legendHoverLink:false, emphasis:{disabled:true}, blur:{lineStyle:{opacity:1},areaStyle:{opacity:0}}, z:0});
    series.push({name:"趨勢帶", type:"line", data:bandGap, stack:"trendBand", showSymbol:false, smooth:false,
      lineStyle:{width:0,opacity:0}, itemStyle:{opacity:0}, areaStyle:{color:safeColor("--trend-band","rgba(37,99,235,.18)"),opacity:1},
      silent:true, tooltip:{show:false}, legendHoverLink:false, emphasis:{disabled:true}, blur:{lineStyle:{opacity:1},areaStyle:{opacity:1}}, z:0});
    series.push({name:"趨勢帶上緣", type:"line", data:up, showSymbol:false, smooth:false,
      lineStyle:{width:1.1,type:"dotted",color:safeColor("--trend-edge","rgba(37,99,235,.58)")}, itemStyle:{color:safeColor("--trend-edge","rgba(37,99,235,.58)")},
      silent:true, tooltip:{show:false}, legendHoverLink:false, emphasis:{disabled:true}, blur:{lineStyle:{opacity:1}}, z:1});
    series.push({name:"趨勢帶下緣", type:"line", data:lo, showSymbol:false, smooth:false,
      lineStyle:{width:1.1,type:"dotted",color:safeColor("--trend-edge","rgba(37,99,235,.58)")}, itemStyle:{color:safeColor("--trend-edge","rgba(37,99,235,.58)")},
      silent:true, tooltip:{show:false}, legendHoverLink:false, emphasis:{disabled:true}, blur:{lineStyle:{opacity:1}}, z:1});
    series.push({name:"趨勢線", type:"line", data:mid, showSymbol:false, smooth:false,
      lineStyle:{width:1.9,type:"dashed",color:"#2563EB"}, itemStyle:{color:"#2563EB"}, silent:true, hoverAnimation:false, legendHoverLink:false, emphasis:{disabled:true, focus:"none", lineStyle:{opacity:1,width:1.9}}, blur:{lineStyle:{opacity:1}}, z:3});
    legend.push("趨勢線");
  }
  if(showMa60){ series.push({name:"季線", type:"line", data:ma60, showSymbol:false, lineStyle:{width:1.7,color:"#D97706"}, itemStyle:{color:"#D97706"}, z:3, silent:true, hoverAnimation:false, legendHoverLink:false, emphasis:{disabled:true, focus:"none", lineStyle:{opacity:1,width:1.7}}, blur:{lineStyle:{opacity:1}}}); legend.push("季線"); }
  if(showMa240){ series.push({name:"年線", type:"line", data:ma240, showSymbol:false, lineStyle:{width:1.7,color:"#16A34A"}, itemStyle:{color:"#16A34A"}, z:3, silent:true, hoverAnimation:false, legendHoverLink:false, emphasis:{disabled:true, focus:"none", lineStyle:{opacity:1,width:1.7}}, blur:{lineStyle:{opacity:1}}}); legend.push("年線"); }
  if(showMa2400){ series.push({name:"十年線", type:"line", data:ma2400, showSymbol:false, lineStyle:{width:1.7,color:"#7C3AED"}, itemStyle:{color:"#7C3AED"}, z:3, silent:true, hoverAnimation:false, legendHoverLink:false, emphasis:{disabled:true, focus:"none", lineStyle:{opacity:1,width:1.7}}, blur:{lineStyle:{opacity:1}}}); legend.push("十年線"); }

  const chart=getChart("trend-chart");
  if(!chart) return;
  chart.setOption({
    backgroundColor:"transparent",
    animation:false,
    grid:{left:48,right:14,top:36,bottom:32,containLabel:false},
    // 趨勢圖改用外部 DOM tooltip,避免 ECharts hover/emphasis 讓其他線條變淡。
    tooltip:{show:false},
    legend:{

/* ── 資金面:三大法人買賣超 + 融資融券餘額(僅台股,免費官方資料,證交所)── */
const fundsCache={};   // 同一次 session 內快取,避免重複切換分頁就重打 API
function fmtLots(v){ // 股數轉「張」(1張=1000股),保留正負號
  if(v==null||isNaN(v)) return "—";
  const lots=v/1000;
  return (lots>0?"+":"")+lots.toLocaleString("zh-Hant",{maximumFractionDigits:0})+" 張";
}
function fmtLotsCompact(v){
  if(v==null||isNaN(v)) return "—";
  const lots=v/1000, abs=Math.abs(lots), sign=lots>0?"+":lots<0?"−":"";
  if(abs>=10000) return sign+(abs/10000).toLocaleString("zh-Hant",{maximumFractionDigits:1})+"萬張";
  return sign+abs.toLocaleString("zh-Hant",{maximumFractionDigits:0})+"張";
}
function fmtAxisLots(lots){
  if(lots==null||isNaN(lots)) return "—";
  const abs=Math.abs(lots), sign=lots>0?"+":lots<0?"−":"";
  if(abs>=10000) return sign+(abs/10000).toLocaleString("zh-Hant",{maximumFractionDigits:1})+"萬";
  return sign+abs.toLocaleString("zh-Hant",{maximumFractionDigits:0});
}
function fmtFundDate(s, full=false){
  if(!s) return "—";
  const t=String(s);
  if(/^\d{8}$/.test(t)) return full ? `${t.slice(0,4)}/${t.slice(4,6)}/${t.slice(6,8)}` : `${t.slice(4,6)}/${t.slice(6,8)}`;
  return t;
}
function fundColorClass(v){ return v>0?"up":v<0?"down":""; }
function fundRow(label,val,color){
  return `<div class="fund-row"><span class="fund-k">${label}</span><span class="fund-v ${color}">${fmtLots(val)}</span></div>`;
}
function fundMetric(label, value, sub, color=""){
  return `<div class="fund-metric"><div class="mk">${label}</div><div class="mv ${color}">${value}</div><div class="ms">${sub}</div></div>`;
}
function sumInst(history, key){
  return history.reduce((acc,d)=>{
    const v=d.institutional?+d.institutional[key]:NaN;
    return acc+(Number.isFinite(v)?v:0);
  },0);
}
function marginDelta(history, key){
  const rows=history.filter(d=>d.margin&&Number.isFinite(+d.margin[key]));
  if(rows.length<2) return null;
  return +rows[rows.length-1].margin[key] - +rows[0].margin[key];
}
async function loadFundsView(symbol){
  const wrap=document.getElementById("funds-wrap");
  if(!wrap) return;
  if(fundsCache[symbol]){ renderFundsView(wrap, fundsCache[symbol]); return; }
  wrap.innerHTML=`<div class="status">即時抓取近兩週資金面資料…</div>`;

  // 後端一次算完近兩週三大法人+融資融券,沒有串流、拿不到真實百分比,
  // 所以進度條用「平滑爬升」當忙碌指示:逐漸逼近 90% 但不到頂,資料一到再補到 100%。
  const t=toast(`抓取 ${symbol} 資金面資料…`, 0);
  t.progress(0.05, `抓取 ${symbol} 資金面資料…`);
  let p=0.05;
  const timer=setInterval(()=>{ p += (0.9-p)*0.08; t.progress(p); }, 400);

  try{
    const r=await api(`/api/stock/${symbol}/funds`);
    clearInterval(timer);
    fundsCache[symbol]=r;
    if(current!==symbol){ t.dismiss(); return; }   // 使用者已切到別檔,不覆蓋畫面
    t.done(r.available ? "資金面資料已更新" : "資金面:近兩週無可用資料");
    renderFundsView(wrap, r);
  }catch(e){
    clearInterval(timer);
    t.err("資金面抓取失敗");
    if(current===symbol) wrap.innerHTML=`<div class="status">抓取失敗:${e}</div>`;
  }
}
function renderFundsView(wrap, r){
  if(!r.available){
    wrap.innerHTML=`<div class="status">${escH(r.reason||"此資料目前無法取得")}</div>`;

  const inst=r.institutional, mar=r.margin;
  const total2w=sumInst(history,"total_net"), foreign2w=sumInst(history,"foreign_net"), trust2w=sumInst(history,"trust_net");
  const mDelta=marginDelta(history,"margin_balance"), sDelta=marginDelta(history,"short_balance");
  const period = history.length ? `${fmtFundDate(history[0].date,true)} ~ ${fmtFundDate(history[history.length-1].date,true)}` : "—";

  const summaryHTML=`<div class="fund-summary">

  const instHTML = inst ? `

      ${fundRow("投信", inst.trust_net,   fundColorClass(inst.trust_net))}
      ${fundRow("自營商", inst.dealer_net, fundColorClass(inst.dealer_net))}

    </div>` : `<div class="funds-card"><div class="status">融資融券資料目前無法取得</div></div>`;

  const tableRows=history.slice().reverse().map(d=>{
    const i=d.institutional||{}, m=d.margin||{};
    return `<tr>
      <td class="mono">${fmtFundDate(d.date,true)}</td>
      <td class="${fundColorClass(i.foreign_net)}">${fmtLots(i.foreign_net)}</td>
      <td class="${fundColorClass(i.trust_net)}">${fmtLots(i.trust_net)}</td>
      <td class="${fundColorClass(i.dealer_net)}">${fmtLots(i.dealer_net)}</td>
      <td class="${fundColorClass(i.total_net)}">${fmtLots(i.total_net)}</td>
      <td>${fmtLots(m.margin_balance)}</td>
      <td>${fmtLots(m.short_balance)}</td>
    </tr>`;
  }).join("");

  wrap.innerHTML = summaryHTML +
    `<div class="fund-grid">
      <div class="fund-chart-card">
        <div class="fund-chart-title"><span class="t">三大法人買賣超趨勢</span><span class="h">外資 / 投信 / 自營商折線 + 法人合計柱狀 · 單位:張 · 正數買超 / 負數賣超</span></div>
        <div class="fund-chart-wrap">
          <div id="fund-flow-legend" class="chart-ext-legend" aria-label="三大法人圖例"></div>
          <div id="fund-flow-chart" class="chart-box chart-fund"></div>
        </div>
      </div>
      <div class="fund-chart-card">
        <div class="fund-chart-title"><span class="t">融資融券餘額用量</span><span class="h">單位:張 · 觀察槓桿部位變化</span></div>
        <div class="fund-chart-wrap">
          <div id="fund-margin-legend" class="chart-ext-legend" aria-label="融資融券圖例"></div>
          <div id="fund-margin-chart" class="chart-box chart-fund"></div>
        </div>
      </div>
    </div>` +
    `<div class="funds-card"><div class="subt2">最新日摘要</div>${instHTML}${marHTML}</div>` +
    `<div class="fund-table-wrap"><table class="fund-table">
      <thead><tr><th>日期</th><th>外資</th><th>投信</th><th>自營商</th><th>法人合計</th><th>融資餘額</th><th>融券餘額</th></tr></thead>

const _extLegendState={};
function setupExternalChartLegend(chartId, legendId, items){
  const chart=_echarts.get(chartId);
  const box=document.getElementById(legendId);
  if(!chart || !box) return;
  const state=_extLegendState[chartId] || {};
  items.forEach(it=>{ if(state[it.name] === undefined) state[it.name]=true; });
  _extLegendState[chartId]=state;

  function render(){
    box.innerHTML=items.map(it=>{
      const on=state[it.name] !== false;
      const icon=it.kind === "bar" ? "lg-bar" : "lg-line";
      return `<button type="button" class="legend-btn${on?"":" off"}" data-lg="${escH(it.name)}" aria-pressed="${on?"true":"false"}" title="${on?"隱藏":"顯示"} ${escH(it.name)}">`+
             `<span class="${icon}" style="--lgc:${it.color}"></span><span>${escH(it.name)}</span></button>`;
    }).join("");
    box.querySelectorAll(".legend-btn").forEach(btn=>{
      btn.addEventListener("click", e=>{
        e.preventDefault(); e.stopPropagation();
        const name=btn.getAttribute("data-lg");
        state[name]=!(state[name] !== false);
        try{ chart.setOption({legend:{selected:{...state}}}); }catch(err){}
        render();
      });
    });
  }

  try{ chart.setOption({legend:{show:false,selectedMode:true,data:items.map(i=>i.name),selected:{...state}}}); }catch(e){}
  render();
}

function drawPE(I, thr){
  const trail=I.pe, fwd=I.forward_pe;
  const mktPE = (_marketContext && _marketContext.market_pe) ? _marketContext.market_pe.avg_pe : null;
  const bars=[
    {label:"Trailing P/E", val:trail, color:"#2563EB"},
    {label:"Forward P/E",  val:fwd,   color:"#7C3AED"},
  ].filter(b=>b.val!=null&&!isNaN(b.val)&&b.val>0);

  // 填欄位
  const fmt1=v=>(v==null||isNaN(v))?"—":Number(v).toFixed(1);
  document.getElementById("pe-trail").textContent=fmt1(trail);
  document.getElementById("pe-trail").className="pm-v "+(trail>thr?"down":trail>0?"up":"");
  document.getElementById("pe-fwd").textContent=fmt1(fwd);
  document.getElementById("pe-fwd").className="pm-v "+(fwd>thr?"down":fwd>0?"up":"");
  document.getElementById("pe-peg").textContent=fmt1(I.peg);
  document.getElementById("pe-pb").textContent=fmt1(I.pb);
  document.getElementById("pe-dy").textContent=fmtPct(I.div_yield);
  const eg=I.earnings_growth;
  document.getElementById("pe-eg").textContent=(eg==null||isNaN(eg))?"—":(eg*100).toFixed(1)+"%";
  document.getElementById("pe-eg").className="pm-v "+(eg>0?"up":eg<0?"down":"");

  // verdict
  const hasTrail=trail!=null&&!isNaN(trail)&&trail>0;
  let verdict="";
  if(!hasTrail){ verdict="<span style='color:var(--faint)'>無法取得本益比資料(可能虧損或未上市)</span>"; }
  else if(trail>thr*1.5){ verdict=`<span class='down'>⚠ Trailing P/E ${trail.toFixed(1)} 遠高於門檻 ${thr}×,估值偏貴</span>`; }
  else if(trail>thr){ verdict=`<span class='down'>Trailing P/E ${trail.toFixed(1)} 高於門檻 ${thr}×,偏貴區間</span>`; }
  else if(trail<thr*0.7){ verdict=`<span class='up'>✓ Trailing P/E ${trail.toFixed(1)} 低於門檻 ${thr}×,相對便宜</span>`; }
  else { verdict=`<span style='color:var(--mist)'>Trailing P/E ${trail.toFixed(1)} 接近門檻 ${thr}×,中性</span>`; }
  document.getElementById("pe-verdict").innerHTML=verdict;
  const noteEl=document.getElementById("pe-mkt-note");
  if(noteEl){
    noteEl.textContent = mktPE
      ? `紅虛線 = 你設定的門檻(${thr}×)。綠點線 = 大盤平均本益比 ${mktPE}×(證交所全市場簡單平均,僅供粗略參考)。`
      : `虛線 = 你設定的參考門檻(預設 20×,可調)。大盤平均本益比載入中或暫無法取得。`;
  }

  if(!bars.length){ renderEmptyChart("pe-chart", "無法取得本益比資料"); return; }

  const data=bars.map(b=>({
    value:+Number(b.val).toFixed(2),
    itemStyle:{
      color:b.val>thr ? "rgba(220,38,38,.14)" : b.color+"22",
      borderColor:b.val>thr ? safeColor("--down","#DC2626") : b.color,
      borderWidth:1.5,
      borderRadius:6
    },
    label:{
      show:true, position:"right", formatter:`${Number(b.val).toFixed(1)}×`,
      color:safeColor("--paper","#1A2332"), fontWeight:700, fontFamily:"IBM Plex Mono, Menlo, monospace", fontSize:13
    }
  }));
  const markData=[{xAxis:thr, name:"門檻"}];
  if(mktPE) markData.push({xAxis:mktPE, name:"大盤均值"});

  const chart=getChart("pe-chart");
  if(!chart) return;
  chart.setOption({
    backgroundColor:"transparent",
    animation:false,
    grid:{left:104,right:56,top:22,bottom:22},
    tooltip:{
      trigger:"axis", confine:true, axisPointer:{type:"shadow"},
      backgroundColor:safeColor("--panel","#fff"), borderColor:safeColor("--line","#E2E6ED"), textStyle:chartTextStyle(12,"--paper"),
      valueFormatter:v=>`${Number(v).toFixed(1)}×`
    },
    xAxis:{
      type:"value", min:0,
      axisLabel:{...chartMonoStyle(10,"--faint"),formatter:v=>`${v}×`},
      splitLine:{lineStyle:{color:safeColor("--line","#E2E6ED")}},
      axisLine:{show:false},axisTick:{show:false}
    },
    yAxis:{
      type:"category", data:bars.map(b=>b.label), inverse:true,
      axisLabel:{...chartTextStyle(11,"--mist")},
      axisTick:{show:false},axisLine:{show:false}
    },
    series:[{
      name:"本益比", type:"bar", data, barWidth:44,
      markLine:{
        symbol:"none", silent:true,
        data:markData,
        label:{formatter:p=>p.name==="門檻"?`門檻 ${thr}×`:`大盤均值 ${mktPE}×`, color:safeColor("--mist","#5A6A7E"), fontSize:10, fontFamily:"IBM Plex Mono, Menlo, monospace"},
        lineStyle:{type:"dashed", color:safeColor("--down","#DC2626"), width:1.5}
      }
    }]
  }, true);
}

/* ── 手機抽屜:清單的開合(僅 ≤680px 生效,PC 上按鈕本身就隱藏) ── */
function openDrawer(){ document.body.classList.add("drawer-open"); }
function closeDrawer(){ document.body.classList.remove("drawer-open"); }
document.getElementById("drawer-fab")?.addEventListener("click", openDrawer);
document.getElementById("drawer-close")?.addEventListener("click", closeDrawer);
document.getElementById("drawer-backdrop")?.addEventListener("click", closeDrawer);
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeDrawer(); });
// 從手機轉回寬螢幕(或旋轉)時,確保抽屜狀態不殘留
window.matchMedia("(max-width:680px)").addEventListener?.("change", ev=>{ if(!ev.matches) closeDrawer(); });

/* ── MA 線顯示開關,localStorage 持久化(預設全顯示) ── */
const MA_KEY="sv_ma_visible";
function loadMaVisible(){ try{ return JSON.parse(localStorage.getItem(MA_KEY))||{}; }catch(e){ return {}; } }
function getMaVisible(key){ const v=loadMaVisible()[key]; return v===undefined?true:v; }
function setMaVisible(key,val){ const m=loadMaVisible(); m[key]=val; try{ localStorage.setItem(MA_KEY,JSON.stringify(m)); }catch(e){} }

/* ── 顯示期間(1月~5年,以「月」為內部單位),localStorage 持久化(預設 24個月=2年) ── */
const PERIOD_KEY="sv_period_months";
const PERIOD_OPTIONS=[1,3,6,12,24,36,48,60];
function getPeriodMonths(){
  const v=parseInt(localStorage.getItem(PERIOD_KEY),10);
  return PERIOD_OPTIONS.includes(v) ? v : 24;
}
function setPeriodMonths(m){
  if(!PERIOD_OPTIONS.includes(m)) m=24;
  try{ localStorage.setItem(PERIOD_KEY,m); }catch(e){}
}

async function select(sym,force){
  current=sym; renderList(); showStatus(`即時抓取 ${sym} …`);
  // 手機:選了股票就收抽屜、把畫面捲到圖表,不必再手動關清單/往下滑
  if(typeof closeDrawer==="function" && window.matchMedia("(max-width:680px)").matches){
    closeDrawer();
    document.getElementById("main")?.scrollIntoView({behavior:"smooth",block:"start"});
  }
  try{
    // 固定抓 15 年資料:十年線(2400日均線)要有完整 ~10 年歷史才有值,
    // 再加上最長 5 年的顯示視窗,才能讓十年線在整段視窗都顯示出來。
    const q = "?years=15" + (force?"&force=1":"");
    const d=await api(`/api/stock/${sym}${q}`);
    if(current===sym){ currentData=d; renderStock(d); }
  }
  catch(e){ if(current===sym) showStatus(`抓取失敗:${e}`); }
}

async function del(sym){
  Store.deleteItem(sym);
  await loadAll();
  const items=currentItems();
  if(current===sym){ current=null; currentData=null; activeView="trend";
    if(items.length) select(items[0].symbol); else showStatus("這個清單空了,左邊新增一檔吧。"); }
}

const errEl=document.getElementById("err"), inp=document.getElementById("newsym"),
      btn=document.getElementById("addbtn"), box=document.getElementById("results");

function clearResults(){ box.innerHTML=""; box.style.display="none"; }

async function addByCode(code){
  errEl.textContent=""; code=code.trim().toUpperCase(); if(!code)return;
  if(Store.hasSymbol(code)){ errEl.textContent="已在清單中"; return; }
  btn.disabled=true;
  try{
    // 後端無狀態,名稱要前端自己解析:打 /api/stock 拿 info.name,同時驗證代號真的抓得到。
    // 這次抓的是輕量預設期間,後端會快取;隨後 select() 抓 15 年版是另一組快取。
    let name=code;
    const d=await api(`/api/stock/${code}`);   // 代號無效會 reject → 進 catch,不會加進清單
    name=(d.info&&d.info.name)||code;
    Store.addItem(code, name, currentTab);
    inp.value=""; clearResults(); await loadAll(); select(code);
  }
  catch(e){ errEl.textContent=(typeof e==="string"?e:"查無此代號或抓取失敗"); }
  finally{ btn.disabled=false; }
}

function renderResults(list,q){
  let rows=list.map(r=>`<div class="rrow" data-code="${r.symbol}">
    <span class="rc mono">${r.symbol}</span><span class="rn">${escH(r.name||"")}</span><span class="rind">${escH(r.industry||"")}</span></div>`).join("");
  const codeLike=/^[A-Za-z0-9.\-]+$/.test(q);
  if(q&&codeLike&&!list.some(r=>r.symbol.toUpperCase()===q.toUpperCase()))
    rows+=`<div class="rrow direct" data-code="${q.toUpperCase()}">＋ 直接以代號「${q.toUpperCase()}」新增</div>`;
  box.innerHTML=rows||(q?`<div class="rempty">查無「${q}」,可改打代號</div>`:"");
  box.style.display=box.innerHTML?"block":"none";
  box.querySelectorAll(".rrow").forEach(el=>el.addEventListener("click",()=>addByCode(el.dataset.code)));
}

let timer;
inp.addEventListener("input",()=>{ clearTimeout(timer); errEl.textContent="";
  const q=inp.value.trim(); if(!q){clearResults();return;}
  timer=setTimeout(async()=>{try{renderResults(await api("/api/search?q="+encodeURIComponent(q)),q);}catch(e){clearResults();}},300);
});

async function addBest(){
  const q=inp.value.trim(); if(!q)return;
  let list=[]; try{list=await api("/api/search?q="+encodeURIComponent(q));}catch(e){}
  if(list.length){ addByCode(list[0].symbol); return; }
  const codeLike=/^[A-Za-z0-9.\-]+$/.test(q);
  if(codeLike){ addByCode(q); return; }     // 像代號(例如美股 AAPL)才直接嘗試
  errEl.textContent=`查無「${q}」,請改用股票代號,或從候選清單中選擇`;
}
btn.addEventListener("click",addBest);
inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addBest();}});
document.addEventListener("click",e=>{if(!e.target.closest(".add")&&!e.target.closest(".results"))clearResults();});

/* ── 介面縮放(以 zoom 等比縮放整個介面),localStorage 持久化 ── */
const FONT_KEY="sv_zoom", FONT_MIN=0.8, FONT_MAX=1.6, FONT_STEP=0.1;
function loadZoom(){ const v=parseFloat(localStorage.getItem(FONT_KEY)); return (v>=FONT_MIN&&v<=FONT_MAX)?v:1; }
function applyZoom(z){
  z=Math.round(Math.max(FONT_MIN,Math.min(FONT_MAX,z))*10)/10;
  const wrap=document.querySelector(".wrap");
  wrap.style.setProperty("--zoom",z);
  wrap.style.setProperty("--inv-zoom",(1/z).toFixed(4));
  document.getElementById("font-val").textContent=Math.round(z*100)+"%";
  try{ localStorage.setItem(FONT_KEY,z); }catch(e){}
  requestAnimationFrame(()=>requestAnimationFrame(resizeAllCharts));
  return z;
}
let zoomLevel=applyZoom(loadZoom());
document.getElementById("font-inc").addEventListener("click",()=>{zoomLevel=applyZoom(zoomLevel+FONT_STEP);});
document.getElementById("font-dec").addEventListener("click",()=>{zoomLevel=applyZoom(zoomLevel-FONT_STEP);});
const zoomValEl=document.getElementById("font-val");
zoomValEl.addEventListener("click",()=>{zoomLevel=applyZoom(1);});
zoomValEl.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();zoomLevel=applyZoom(1);}});

applyTheme(loadTheme(), false);
const themeBtn=document.getElementById("theme-toggle");
if(themeBtn){
  themeBtn.addEventListener("click",()=>{
    const next=document.documentElement.getAttribute("data-theme")==="dark" ? "light" : "dark";
    applyTheme(next, true);
  });
}


(async function(){
  await loadAll();
  const first=currentItems()[0];
  if(first) select(first.symbol); else showStatus("左邊輸入代號或名稱開始。");
  // 背景工作:全部不等待,不阻塞初始畫面
  // 1. 熱門股刷新(每10分鐘)
  refreshHotTab();
  setInterval(refreshHotTab, 10*60*1000);
  // 2. 大盤本益比(每10分鐘,僅供 PE 評估頁參考)
  loadMarketContext();
  setInterval(loadMarketContext, 10*60*1000);
  // 3. 預載所有觀察清單的完整資料(15年),讓使用者點選時直接命中快取
  const allSymbols=[...new Set(tabs.flatMap(t=>t.items.map(w=>w.symbol)))];
  preloadAll(allSymbols);
})();
</script>
